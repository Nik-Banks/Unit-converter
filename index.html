<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <title>Unit Converter</title>
    </head>
    <body>
        <div id="parent-ctn">
            <div id="conversion-ctn">
                <h1>Metric/Imperial Unit Conversion</h1>
                <input type="number" placeholder="20" id="value">
                <button id="convert-btn">Convert</button>
            </div>
        <div id="length-ctn">
            <div class="display-txt-ctn">
                <p class="display-txt">Length (Meter/Feet)</p>  
            </div>
        </div>
        <div id="volume-ctn">
            <div class="display-txt-ctn">
                <p class="display-txt">Volume (Liters/Gallons)</p>             
            </div>
        </div>
        <div id="mass-ctn">
            <div class="display-txt-ctn">
                <p class="display-txt">Mass (Kilograms/Pounds)</p>
            </div>
        </div>
    </div>
        <script src="index.js"></script>
    </body>
</html>
